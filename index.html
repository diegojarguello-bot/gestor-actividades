<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Actividades de Estudio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8; --surface: #ffffff; --surface2: #e8edf2; --border: #cdd5de;
    --text: #1c2b3a; --text-muted: #5a7080; --text-light: #8a9db0;
    --accent: #2563a8; --accent-light: #dbeafe; --accent-dark: #1a4a80;
    --success: #1a6644; --success-light: #d1fae5;
    --warning: #92530a; --warning-light: #fef3c7;
    --danger: #9b1c1c; --danger-light: #fee2e2;
    --shadow-sm: 0 1px 4px rgba(28,43,58,0.08);
    --shadow: 0 2px 10px rgba(28,43,58,0.10);
    --shadow-lg: 0 6px 28px rgba(28,43,58,0.14);
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* LOADING */
  #loading-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px; background:var(--bg); }
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* LOGIN */
  #login-screen { min-height:100vh; display:none; align-items:center; justify-content:center; padding:24px; background:linear-gradient(160deg,#e8edf2 0%,#d4dde8 100%); }
  .login-card { background:var(--surface); border-radius:16px; border:1px solid var(--border); padding:40px; width:100%; max-width:420px; box-shadow:var(--shadow-lg); }
  .login-tabs { display:flex; margin-bottom:24px; border-bottom:2px solid var(--border); }
  .login-tab { padding:9px 20px; font-size:0.87rem; font-weight:600; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
  .login-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .login-form { display:flex; flex-direction:column; gap:16px; }
  .login-error { font-size:0.82rem; color:var(--danger); background:var(--danger-light); border-radius:6px; padding:9px 13px; display:none; border-left:3px solid var(--danger); }
  .login-error.show { display:block; }

  /* APP HEADER */
  header { background:var(--text); color:white; padding:0 24px; height:58px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,.25); }
  .header-title span { color:#7eb8f0; }
  .stat-pill { background:rgba(255,255,255,.08); border-radius:8px; padding:6px 14px; text-align:center; min-width:80px; }
  .stat-pill strong { display:block; font-size:1.2rem; }

  /* TABS & SECTIONS */
  .tabs { display:flex; background:var(--surface); border-bottom:2px solid var(--border); padding:0 20px; overflow-x:auto; }
  .tab { padding:14px 20px; font-size:0.87rem; font-weight:600; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  main { padding:24px 20px; max-width:920px; margin:0 auto; }
  .section { display:none; }
  .section.active { display:block; }

  /* CARDS */
  .activity-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    border-left:4px solid var(--accent); padding:14px 18px; display:grid;
    grid-template-columns: 1fr auto auto; align-items:center; gap:18px; margin-bottom:10px;
  }
  .activity-card.done-card { border-left-color:var(--success); background:#fafdfb; opacity: 0.8; }
  .urgency-text.red { color:#dc2626; font-weight:700; }
  .urgency-text.orange { color:#d97706; font-weight:700; }

  /* TOAST & MODAL */
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(110px); background:var(--text); color:white; padding:12px 22px; border-radius:8px; z-index:9999; transition:0.3s; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; padding:30px; border-radius:12px; width:90%; max-width:400px; }

  /* FORM ELEMENTS */
  input, select, textarea { width:100%; padding:10px; border:1.5px solid var(--border); border-radius:8px; margin-top:5px; font-family:inherit; }
  .btn { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; font-weight:600; transition: 0.2s; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-danger { background:var(--danger-light); color:var(--danger); }

  @media(max-width:640px){ .activity-card { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><p>Cargando...</p></div>

<div id="login-screen">
  <div class="login-card">
    <h2 style="font-family:'Playfair Display'; margin-bottom:10px;">Mis <span>Actividades</span></h2>
    <div class="login-tabs">
      <div class="login-tab active" onclick="switchLoginTab('login')">Ingresar</div>
      <div class="login-tab" onclick="switchLoginTab('register')">Registrarse</div>
    </div>
    <div id="login-panel" class="login-form">
      <input type="text" id="l-user" placeholder="Usuario">
      <input type="password" id="l-pin" placeholder="PIN (4-6 dígitos)" maxlength="6">
      <div class="login-error" id="login-error"></div>
      <button class="btn btn-primary" onclick="window.doLogin()">Entrar →</button>
    </div>
    <div id="register-panel" class="login-form" style="display:none">
      <input type="text" id="r-name" placeholder="Nombre completo">
      <input type="text" id="r-user" placeholder="Usuario (ej: diego92)">
      <input type="password" id="r-pin" placeholder="PIN" maxlength="6">
      <div class="login-error" id="register-error"></div>
      <button class="btn btn-primary" onclick="window.doRegister()">Crear Cuenta</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="header-title">Estudios <span>UTN</span></div>
    <div style="display:flex; gap:10px;">
      <div class="stat-pill"><strong id="stat-pending">0</strong><small>Pendientes</small></div>
      <button class="btn btn-danger" onclick="window.doLogout()" style="padding:5px 10px;">Salir</button>
    </div>
  </header>

  <nav class="tabs">
    <div class="tab active" onclick="showTab('pendientes')">Pendientes</div>
    <div class="tab" onclick="showTab('nueva')">＋ Nueva</div>
    <div class="tab" onclick="showTab('historial')">Historial</div>
  </nav>

  <main>
    <div id="tab-pendientes" class="section active">
      <div id="list-pendientes"></div>
    </div>

    <div id="tab-nueva" class="section">
      <div class="modal" style="max-width:100%; box-shadow:none;">
        <h3>Nueva Actividad</h3>
        <select id="f-materia"></select>
        <select id="f-tarea"></select>
        <input type="date" id="f-fecha-fin">
        <textarea id="f-notas" placeholder="Notas..."></textarea>
        <button class="btn btn-primary" onclick="window.agregarActividad()" style="margin-top:10px;">Guardar</button>
      </div>
    </div>

    <div id="tab-historial" class="section">
      <div id="list-historial"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB_CONFIG = {
  apiKey:"AIzaSyASirufR-TWJvDgtXhLVNPgMUYbgzi0uH4",
  authDomain:"gestor-de-actividades-c54dc.firebaseapp.com",
  projectId:"gestor-de-actividades-c54dc",
  storageBucket:"gestor-de-actividades-c54dc.firebasestorage.app",
  messagingSenderId:"314631742893",
  appId:"1:314631742893:web:1d1eca28551301c67eed24"
};

const app = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);
const FAKE_DOMAIN = "@actividades-app.internal";

let currentUser = null;
const listas = {
  materias: ['Administración', 'Comportamiento Org.', 'Informática', 'Estadística', 'Economía'],
  tareas: ['Foro', 'Cuestionario', 'Trabajo Práctico', 'Parcial', 'Lectura']
};

// --- AUTH FUNCTIONS ---
window.switchLoginTab = (tab) => {
  document.getElementById('login-panel').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('register-panel').style.display = tab === 'register' ? 'flex' : 'none';
};

window.doLogin = async () => {
  const user = document.getElementById('l-user').value + FAKE_DOMAIN;
  const pin = document.getElementById('l-pin').value;
  try {
    await signInWithEmailAndPassword(auth, user, pin);
  } catch (e) { alert("Error: Usuario o PIN incorrectos"); }
};

window.doRegister = async () => {
  const name = document.getElementById('r-name').value;
  const user = document.getElementById('r-user').value.toLowerCase() + FAKE_DOMAIN;
  const pin = document.getElementById('r-pin').value;
  if(pin.length < 4) return alert("PIN muy corto");
  try {
    const res = await createUserWithEmailAndPassword(auth, user, pin);
    await setDoc(doc(db, "users", res.user.uid), { name, user });
  } catch (e) { alert("Error al registrar"); }
};

window.doLogout = () => signOut(auth);

// --- APP LOGIC ---
onAuthStateChanged(auth, user => {
  document.getElementById('loading-screen').style.display = 'none';
  if(user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    loadSelectors();
    initDataListener();
  } else {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }
});

function loadSelectors() {
  const matSel = document.getElementById('f-materia');
  const tarSel = document.getElementById('f-tarea');
  matSel.innerHTML = listas.materias.map(m => `<option value="${m}">${m}</option>`).join('');
  tarSel.innerHTML = listas.tareas.map(t => `<option value="${t}">${t}</option>`).join('');
}

window.showTab = (tabId) => {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  event.target.classList.add('active');
};

window.agregarActividad = async () => {
  const data = {
    uid: currentUser.uid,
    materia: document.getElementById('f-materia').value,
    tarea: document.getElementById('f-tarea').value,
    fechaFin: document.getElementById('f-fecha-fin').value,
    notas: document.getElementById('f-notas').value,
    estado: 'pendiente',
    createdAt: serverTimestamp()
  };
  await addDoc(collection(db, "actividades"), data);
  showToast("¡Actividad guardada!");
  showTab('pendientes');
};

function initDataListener() {
  const q = query(collection(db, "actividades"), where("uid", "==", currentUser.uid));
  onSnapshot(q, snapshot => {
    const acts = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
    renderList(acts.filter(a => a.estado === 'pendiente'), 'list-pendientes');
    renderList(acts.filter(a => a.estado === 'realizado'), 'list-historial');
    document.getElementById('stat-pending').innerText = acts.filter(a => a.estado === 'pendiente').length;
  });
}

function renderList(list, containerId) {
  const container = document.getElementById(containerId);
  if(list.length === 0) { container.innerHTML = "<p style='padding:20px; color:gray;'>No hay actividades.</p>"; return; }
  
  container.innerHTML = list.map(a => `
    <div class="activity-card ${a.estado === 'realizado' ? 'done-card' : ''}">
      <div>
        <strong>${a.materia}</strong><br>
        <small>${a.tarea} - ${a.fechaFin || 'Sin fecha'}</small>
      </div>
      <div>
        ${a.estado === 'pendiente' ? 
          `<button class="btn btn-primary" onclick="window.updateStatus('${a.id}', 'realizado')">✓</button>` : 
          `<button class="btn btn-danger" onclick="window.deleteAct('${a.id}')">🗑</button>`
        }
      </div>
    </div>
  `).join('');
}

window.updateStatus = (id, status) => updateDoc(doc(db, "actividades", id), { estado: status });
window.deleteAct = (id) => confirm("¿Borrar permanentemente?") && deleteDoc(doc(db, "actividades", id));

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
